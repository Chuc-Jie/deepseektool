name: Release

on:
  push:
    branches: [master]
    paths:
      - 'deepseektool.user.js'

  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，方便对比版本

      - name: 提取版本号
        id: version
        run: |
          VERSION=$(grep -oP '@version\s+\K[\d.]+' deepseektool.user.js)
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"
          echo "当前版本: $VERSION"

      - name: 获取上一版本
        id: prev_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LATEST_TAG" != "none" ]; then
            PREV_VERSION=${LATEST_TAG#v}
            echo "previous=$PREV_VERSION" >> "$GITHUB_OUTPUT"
            echo "上一版本: $PREV_VERSION"
          else
            echo "previous=none" >> "$GITHUB_OUTPUT"
            echo "未找到历史版本"
          fi

      - name: 检查版本是否更新
        id: check
        run: |
          if [ "${{ steps.prev_version.outputs.previous }}" = "${{ steps.version.outputs.current }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "版本号未变化，跳过发布"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "版本已更新: ${{ steps.prev_version.outputs.previous }} → ${{ steps.version.outputs.current }}"
          fi

      - name: 打包源码
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION=${{ steps.version.outputs.current }}
          git archive --format=zip --output=deepseektool-v${VERSION}.zip HEAD
          echo "打包完成: deepseektool-v${VERSION}.zip"

      - name: 提取 CHANGELOG 条目
        id: changelog
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          # 提取当前版本的 CHANGELOG 条目（从 "## v{VERSION}" 到下一个 "## " 或 EOF）
          SECTION=$(awk -v ver="v${VERSION}" '
            $0 ~ "^## " ver "$" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            SECTION="请查看 [CHANGELOG.md](CHANGELOG.md) 了解更新详情。"
          fi
          echo "$SECTION" > release_body.md
          echo "提取到 CHANGELOG 条目 (${#SECTION} 字符)"

      - name: 创建 Release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: v${{ steps.version.outputs.current }}
          body_path: release_body.md
          files: |
            deepseektool.user.js
            deepseektool-v${{ steps.version.outputs.current }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
